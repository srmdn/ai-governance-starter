name: Policy Exception Request
description: Request a temporary exception to AI policy controls
title: "policy-exception: "
labels:
  - governance
  - policy
body:
  - type: textarea
    id: request
    attributes:
      label: Exception Requested
      description: Which requirement do you need to bypass?
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Business/Technical Rationale
    validations:
      required: true
  - type: dropdown
    id: risk_tier
    attributes:
      label: Risk Tier
      options:
        - Tier 0
        - Tier 1
        - Tier 2
        - Tier 3
    validations:
      required: true
  - type: input
    id: expiry
    attributes:
      label: Expiry Date
      placeholder: YYYY-MM-DD
  - type: textarea
    id: compensating_controls
    attributes:
      label: Compensating Controls
      description: What controls reduce added risk while this exception is active?
    validations:
      required: true
